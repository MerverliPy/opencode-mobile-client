selection_order:
  - explicit_user_scope
  - highest_priority
  - same_module_followup
  - smallest_safe_scope
  - clearest_validation

queue_rules:
  - Only entries under `candidates` are selectable.
  - Entries under `archived` are retained so shipped backlog references remain valid.
  - Keep non-selected historical ideas out of `candidates` so `/next-phase` and `/autoflow` stay deterministic.
  - Use `/autoflow` as the default execution path after `/phase-status` or `/next-phase`.
  - Use `target_release` and `release_bump` to guide the next phase's version target.
  - Prefer borrowing architecture and contracts from `open-agents`, not transplanting its full stack.

constraints:
  max_files_changed: 6
  prefer_single_module: true
  avoid_generic_tasks: true

candidates:
  - id: registry-complete-selection-guard-hardening
    title: Guard phase selection against registry-complete backlog ids
    module: workflow
    priority: 19
    release_bump: patch
    target_release: v1.7.3
    execution_flow: /autoflow
    expected_max_files_changed: 4
    drivers:
      - "`workflow:check` currently passes even when backlog ids already recorded as shipped in the registry remain selectable under `candidates`."
      - "`/autoflow` and backlog-repair helpers should treat registry-complete backlog ids as non-selectable so the next phase stays deterministic."
    files:
      - scripts/dev/workflow-check.sh
      - scripts/dev/autoflow.sh
      - scripts/dev/repair-backlog-selection.sh
      - .opencode/backlog/candidates.yaml
    validation: npm run workflow:check && bash scripts/dev/autoflow.sh inspect && npm run repo:doctor
    acceptance:
      - `workflow:check` fails when a registry-complete backlog id remains under selectable `candidates`.
      - `scripts/dev/repair-backlog-selection.sh` archives backlog ids already marked complete or shipped in the registry.
      - `scripts/dev/autoflow.sh` reports the corrected backlog state and does not rely on stale selectable candidates.
      - The repair stays bounded to workflow-state truth and backlog-selection guards only.

archived:
  - id: browser-proof-clean-checkout-runner
    title: Restore clean-checkout browser proof with repo-owned Playwright resolution
    module: browser-validation
    shipped: true

  - id: browser-proof-automation
    title: Replace manual browser-proof handoff with a repeatable repo-owned screenshot capture path
    module: browser-validation
    shipped: true

  - id: workflow-validation-metadata-alignment
    title: Normalize workflow validation metadata so phase state parses consistently
    module: workflow
    priority: 12
    release_bump: patch
    target_release: v2.2.1
    execution_flow: /autoflow
    expected_max_files_changed: 4
    drivers:
      - "`workflow:check`, `repo:doctor`, and `autoflow inspect` currently disagree because active-phase validation metadata is not parsed consistently."
      - Workflow automation must become trustworthy again before later backlog selection, release proof, or product work continues.
    files:
      - .opencode/commands/next-phase.md
      - scripts/dev/workflow-check.sh
      - scripts/dev/doctor.sh
      - scripts/dev/autoflow.sh
    validation: npm run workflow:check && npm run repo:doctor && bash scripts/dev/autoflow.sh inspect
    acceptance:
      - The canonical active-phase validation keys are consistent across phase templates and workflow parsers.
      - "`npm run workflow:check` and `npm run repo:doctor` both read the active validation status correctly."
      - "`bash scripts/dev/autoflow.sh inspect` reports a non-empty validation status and ready-to-ship value when present."
      - The phase stays bounded to workflow metadata and parser alignment only.
    shipped: true

  - id: backlog-selection-determinism
    title: Repair backlog selection so only true candidates remain selectable
    module: workflow
    priority: 11
    release_bump: patch
    target_release: v2.2.2
    execution_flow: /autoflow
    expected_max_files_changed: 5
    drivers:
      - Completed backlog work is still present in selectable backlog state, and deferred ideas are too close to active selection surfaces.
      - "`/autoflow` should only count real selectable candidates so completed or deferred work cannot be reselected accidentally."
    files:
      - .opencode/backlog/candidates.yaml
      - scripts/dev/autoflow.sh
      - scripts/dev/repair-backlog-selection.sh
      - scripts/dev/workflow-check.sh
      - .opencode/commands/next-phase.md
    validation: npm run workflow:check && bash scripts/dev/autoflow.sh inspect && npm run repo:doctor
    acceptance:
      - Only entries under `candidates` are treated as selectable backlog work.
      - Shipped backlog items no longer remain under selectable candidates.
      - Deferred ideas are excluded from active candidate counting and next-phase selection.
      - The repair stays bounded to workflow state and backlog-selection logic.
    shipped: true

  - id: workflow-gate-revalidation-evidence
    title: Re-run workflow gates and capture authoritative evidence after workflow repairs
    module: workflow
    priority: 10
    release_bump: patch
    target_release: v2.2.3
    execution_flow: /autoflow
    expected_max_files_changed: 1
    drivers:
      - The audit fix order explicitly calls for rerunning workflow gates once workflow-state repairs land.
      - The repo should not claim repaired workflow state without fresh gate evidence.
    files:
      - .opencode/plans/current-phase.md
    validation: npm run workflow:check && npm run release:proof
    acceptance:
      - "`npm run workflow:check` passes after the workflow repair phases."
      - "`npm run release:proof` passes and the active phase records fresh evidence instead of stale audit assumptions."
      - No unrelated product or tooling changes are bundled into the evidence pass.
    shipped: true

  - id: clean-install-reproducibility
    title: Restore deterministic clean installs so repo setup and workflow gates are trustworthy
    module: tooling
    shipped: true

  - id: backlog-lifecycle-gating
    title: Prevent completed backlog items from being reselected by the phase workflow
    module: workflow
    shipped: true

  - id: browser-proof-runner
    title: Add repo-root browser-proof and release-proof helpers for SSH/iPhone workflows
    module: browser-validation
    shipped: true

  - id: phase-validation-status-normalization
    title: Normalize new phase templates so validation status starts as pending
    module: workflow
    shipped: true

  - id: remote-runtime-contract
    title: Define the remote runtime contract and durable run model for mobile remote coding
    module: remote-runtime
    shipped: true

  - id: remote-run-shell-state
    title: Add durable remote run lifecycle states and reconnect controls to the mobile shell
    module: remote-runtime
