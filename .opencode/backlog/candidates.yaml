selection_order:
  - explicit_user_scope
  - highest_priority
  - same_module_followup
  - smallest_safe_scope
  - clearest_validation

queue_rules:
  - Only entries under `candidates` are selectable.
  - Remove shipped backlog work from `candidates` immediately after `/ship-phase`.
  - Use git history as the archive for shipped backlog items.
  - Add new work here only when it is still unshipped and still needed.

constraints:
  max_files_changed: 4
  prefer_single_module: true
  avoid_generic_tasks: true

candidates: []
